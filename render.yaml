services:
  - type: web
    name: iacoffe
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3:latest
      - key: DATA_DIR
        value: /app/data
    healthCheckPath: /health
    autoDeploy: true
