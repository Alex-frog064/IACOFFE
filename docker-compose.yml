services:
  app:
    build: .
    container_name: iacoffe
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3:latest
      - DATA_DIR=/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - db-data:/app/data
    restart: unless-stopped

volumes:
  db-data:
